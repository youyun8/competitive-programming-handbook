project_id = "competitive-programming-handbook"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:4321"
additional_redirect_urls = [
  "http://localhost:4321/**",
  "http://127.0.0.1:4321/**"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[functions.sync-progress]
verify_jwt = true

[functions.account-data]
verify_jwt = true
